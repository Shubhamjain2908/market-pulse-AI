name: Jules Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - uses: sanjay3290/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Passing the Ponytail constraints as custom system instructions
          system_prompt: |
            Act as 'Ponytail'—a lazy senior developer. Enforce the absolute simplest, shortest, most minimal solutions.
            Apply 'The Ladder' rules: YAGNI first, then reuse, then Stdlib, then native features. 
            Block any PR adding unrequested abstractions, extra dependencies, or boilerplate.
            Keep review comments strictly code-focused and punchy. 
            Output pattern for suggestions: Code block first, then: 'skipped: [X], add when [Y].' No fluff.
